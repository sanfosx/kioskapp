    <script>
      // Add data-label to table cells for responsive display
      document.addEventListener('DOMContentLoaded', () => {
        const updateTables = () => {
          document.querySelectorAll('.responsive-table').forEach(table => {
            const headers = Array.from(table.querySelectorAll('thead th')).map(th => th.textContent.trim());
            table.querySelectorAll('tbody tr').forEach(tr => {
              Array.from(tr.querySelectorAll('td')).forEach((td, index) => {
                if (headers[index] && !td.hasAttribute('data-label')) {
                  td.setAttribute('data-label', headers[index]);
                }
              });
            });
          });
        };
        const observer = new MutationObserver(updateTables);
        observer.observe(document.body, { childList: true, subtree: true });
        updateTables();
      });
    </script>
